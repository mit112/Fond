# SwiftLint configuration for Fond
# SwiftLint 0.63.2

included:
  - Fond
  - FondNotificationService
  - watchkitapp Watch App
  - widgets

excluded:
  - Fond/Fond.xcodeproj
  - FondTests
  - FondUITests
  - watchkitapp Watch AppTests
  - watchkitapp Watch AppUITests
  - .build

disabled_rules:
  - trailing_comma         # We use trailing commas consistently
  - opening_brace          # Conflicts with SwiftUI builder syntax

opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_filter_count
  - contains_over_first_not_nil
  - discouraged_optional_boolean
  - empty_collection_literal
  - empty_string
  - fatal_error_message
  - first_where
  - last_where
  - modifier_order
  - overridden_super_call
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - unowned_variable_capture
  - vertical_whitespace_closing_braces

line_length:
  warning: 140
  error: 200
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 500
  error: 800

function_body_length:
  warning: 60
  error: 100

type_name:
  min_length: 2
  max_length: 50

identifier_name:
  min_length:
    warning: 1
  max_length:
    warning: 60
  excluded:
    - id
    - x
    - y
    - R
    - a
    - c
    - i

nesting:
  type_level: 3
  function_level: 3

large_tuple:
  warning: 4

cyclomatic_complexity:
  warning: 15
  error: 25
